name: Generate md5 sums
on: [push]
jobs:
  Retrieve-Firmware:
    runs-on: ubuntu-24.04
    steps:
      - name: Free up disk space for the CI
        uses: AdityaGarg8/remove-unwanted-software@v3
        with:
          remove-android: 'false'
          remove-dotnet: 'false'
          remove-haskell: 'false'
          remove-codeql: 'false'
          remove-docker-images: 'false'

      - name: 'Checkout Repo'
        uses: actions/checkout@v4

      - name: Get kconfig
        run: |
          #wget -m -np -nH --cut-dirs=3 -e robots=off --reject "index.html*" -P ${{ github.workspace }}/repo https://pkg-repo.blendos.co
          wget -q https://github.com/AdityaGarg8/T2-UBUNTU-NEW/releases/download/v6.9.5-1/ubuntu-24.04-6.9.5-t2-noble.iso.00
          wget -q https://github.com/AdityaGarg8/T2-UBUNTU-NEW/releases/download/v6.9.5-1/ubuntu-24.04-6.9.5-t2-noble.iso.01
          cat ubuntu-24.04-6.9.5-t2-noble.iso.* > ubuntu-24.04-6.9.5-t2-noble.iso
          sha256sum ubuntu-24.04-6.9.5-t2-noble.iso
          ls
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: blendos
          #path: /mnt/casper/*.manifest
          path: ${{ github.workspace }}/repo/*
